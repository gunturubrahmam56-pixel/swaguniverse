<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swag Wear | Kids</title>

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="style.css">

  <!-- Icons -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

  <!-- ✅ POPUP MESSAGE -->
  <div id="popup-msg"></div>

  <!-- ✅ NAVBAR -->
  <header class="navbar">

    <!-- Back Button -->
    <a href="index.html" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i> Back
    </a>

    <div class="logo">Swag Wear</div>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="men.html">Men</a></li>
      <li><a href="women.html">Women</a></li>
      <li><a href="kids.html">Kids</a></li>

      <!-- ✅ CART ICON -->
      <li>
        <a href="cart.html" class="cart-icon">
          <i class="fa-solid fa-cart-shopping"></i>
          <span id="cart-count">0</span>
        </a>
      </li>
    </ul>

  </header>

  <!-- ✅ BANNER -->
  <section class="small-banner">
    <div class="banner-text">
      <h1>Kids’ Collection</h1>
      <p>Fun • Comfort • Swag for Every Little Star</p>
    </div>
  </section>

  <!-- ✅ PRODUCTS -->
  <section class="products">
    <h2>Top Picks for Kids</h2>

    <div class="product-grid">

      <!-- Kids T-shirt -->
      <div class="product">
        <img src="assets/images/kids1.jpg" alt="Kids T-shirt">
        <h3>Fun Graphic Tee</h3>
        <p>₹499</p>

        <button class="detail-btn">View Details</button>
        <button class="cart-btn">Add to Cart</button>
      </div>

      <!-- Kids Hoodie -->
      <div class="product">
        <img src="assets/images/kids2.jpg" alt="Kids Hoodie">
        <h3>Colorful Hoodie</h3>
        <p>₹899</p>

        <button class="detail-btn">View Details</button>
        <button class="cart-btn">Add to Cart</button>
      </div>

      <!-- Kids Outfit -->
      <div class="product">
        <img src="assets/images/kids3.jpg" alt="Kids Outfit">
        <h3>Playtime Outfit</h3>
        <p>₹1,199</p>

        <button class="detail-btn">View Details</button>
        <button class="cart-btn">Add to Cart</button>
      </div>

    </div>
  </section>

  <!-- ✅ FOOTER -->
  <footer>
    <p>© 2025 Swag Wear | All Rights Reserved</p>
  </footer>

  <!-- ✅ JAVASCRIPT -->
  <script>

    /* ✅ UPDATE CART COUNT */
    function updateCartCount() {
      let cart = JSON.parse(localStorage.getItem("cartData")) || [];
      document.getElementById("cart-count").innerText = cart.length;
    }
    updateCartCount();


    /* ✅ POPUP MESSAGE */
    function showPopup(message) {
      const popup = document.getElementById("popup-msg");
      popup.innerText = message;
      popup.style.display = "block";
      setTimeout(() => popup.style.display = "none", 2000);
    }


    /* ✅ ADD TO CART FUNCTION */
    const cartButtons = document.querySelectorAll(".cart-btn");

    cartButtons.forEach((btn) => {
      btn.addEventListener("click", function () {

        const product = this.parentElement;
        const name = product.querySelector("h3").innerText;
        const price = product.querySelector("p").innerText.replace("₹", "");
        const image = product.querySelector("img").src;

        let cart = JSON.parse(localStorage.getItem("cartData")) || [];

        cart.push({ name, price, image, qty: 1 });

        localStorage.setItem("cartData", JSON.stringify(cart));

        updateCartCount();
        showPopup("✅ Added to Cart");
      });
    });


    /* ✅ VIEW DETAILS → detail.html */
    const detailButtons = document.querySelectorAll(".detail-btn");

    detailButtons.forEach((btn) => {
      btn.addEventListener("click", function () {

        const product = this.parentElement;
        const name = product.querySelector("h3").innerText;
        const price = product.querySelector("p").innerText.replace("₹", "");
        const image = product.querySelector("img").src;

        localStorage.setItem("selectedProduct",
          JSON.stringify({ name, price, image })
        );

        window.location.href = "detail.html";
      });
    });

  </script>

</body>
</html>
