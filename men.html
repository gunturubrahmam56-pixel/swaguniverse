<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swag Wear | Men</title>

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="style.css">

  <!-- Icons -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

  <!-- ✅ POPUP MESSAGE -->
  <div id="popup-msg"></div>

  <!-- ✅ NAVBAR -->
  <header class="navbar">

    <!-- Back Button -->
    <a href="index.html" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i> Back
    </a>

    <div class="logo">Swag Wear</div>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="men.html">Men</a></li>
      <li><a href="women.html">Women</a></li>
      <li><a href="kids.html">Kids</a></li>

      <!-- ✅ CART ICON -->
      <li>
        <a href="cart.html" class="cart-icon">
          <i class="fa-solid fa-cart-shopping"></i>
          <span id="cart-count">0</span>
        </a>
      </li>
    </ul>

  </header>

  <!-- ✅ BANNER -->
  <section class="small-banner">
    <div class="banner-text">
      <h1>Men’s Collection</h1>
      <p>Style. Strength. Swag.</p>
    </div>
  </section>

  <!-- ✅ PRODUCTS SECTION -->
  <section class="products">
    <h2>Top Picks for Men</h2>

    <div class="product-grid">

      <!-- T-Shirt -->
      <div class="product">
        <img src="assets/images/tshirt.jpg" alt="Men T-shirt">
        <h3>Casual T-Shirt</h3>
        <p>₹799</p>

        <!-- View Details -->
        <button class="detail-btn">View Details</button>

        <!-- Add to Cart -->
        <button class="cart-btn">Add to Cart</button>
      </div>

      <!-- Hoodie -->
      <div class="product">
        <img src="assets/images/hoodie.jpg" alt="Men Hoodie">
        <h3>Black Hoodie</h3>
        <p>₹1,299</p>

        <button class="detail-btn">View Details</button>
        <button class="cart-btn">Add to Cart</button>
      </div>

      <!-- Leather Jacket -->
      <div class="product">
        <img src="assets/images/jacket.jpg" alt="Leather Jacket">
        <h3>Leather Jacket</h3>
        <p>₹2,499</p>

        <button class="detail-btn">View Details</button>
        <button class="cart-btn">Add to Cart</button>
      </div>

    </div>
  </section>

  <!-- ✅ FOOTER -->
  <footer>
    <p>© 2025 Swag Wear | All Rights Reserved</p>
  </footer>

  <!-- ✅ JAVASCRIPT -->
  <script>

    /* ✅ UPDATE CART COUNT */
    function updateCartCount() {
      let cart = JSON.parse(localStorage.getItem("cartData")) || [];
      document.getElementById("cart-count").innerText = cart.length;
    }
    updateCartCount();

    /* ✅ POPUP */
    function showPopup(message) {
      const popup = document.getElementById("popup-msg");
      popup.innerText = message;
      popup.style.display = "block";

      setTimeout(() => {
        popup.style.display = "none";
      }, 2000);
    }

    /* ✅ ADD TO CART */
    const cartButtons = document.querySelectorAll(".cart-btn");

    cartButtons.forEach((btn) => {
      btn.addEventListener("click", function () {

        const product = this.parentElement;
        const name = product.querySelector("h3").innerText;
        const price = product.querySelector("p").innerText.replace("₹", "");
        const image = product.querySelector("img").src;

        let cart = JSON.parse(localStorage.getItem("cartData")) || [];
        cart.push({ name, price, image, qty: 1 });

        localStorage.setItem("cartData", JSON.stringify(cart));

        updateCartCount();
        showPopup("✅ Added to Cart");
      });
    });

    /* ✅ VIEW DETAILS → detail.html */
    const detailButtons = document.querySelectorAll(".detail-btn");

    detailButtons.forEach((btn) => {
      btn.addEventListener("click", function () {

        const product = this.parentElement;
        const name = product.querySelector("h3").innerText;
        const price = product.querySelector("p").innerText.replace("₹", "");
        const image = product.querySelector("img").src;

        // Save selected product
        localStorage.setItem("selectedProduct", JSON.stringify({ name, price, image }));

        // Open detail page
        window.location.href = "detail.html";
      });
    });

  </script>

</body>
</html>
